# Azure Web Apps Deploy: https://github.com/Azure/webapps-deploy
# Deploys full Node.js app (Express + public/) to Azure App Service.

name: Build and deploy Node.js app to Azure Web App - app-fde-case-eus2

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: npm ci, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E27911F0B04B42598730B3A7FBBD55A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F7F60FBFA2C439D9D5B39445FA6D690 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BBB4608E74F1433CBB9B9C34DD90394D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-fde-case-eus2'
          slot-name: 'Production'
          package: .
